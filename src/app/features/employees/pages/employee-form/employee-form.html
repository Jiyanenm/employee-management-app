<div class="form-page">

    <div class="form-card">

        <h2>{{ isEditMode ? 'Edit Employee' : 'Add Employee' }}</h2>

        <p class="subtitle">Employee details form</p>

        <form (ngSubmit)="saveEmployee(empForm)" #empForm="ngForm">

            <!-- FULL NAME -->
            <div class="form-group">

                <label>Full Name</label>

                <input
                    type="text"
                    name="name"
                    [(ngModel)]="employee.name"
                    required
                    #name="ngModel"
                    [class.invalid]="name.invalid && name.touched">

                <div *ngIf="name.invalid && name.touched" class="error">
                    Full name is required
                </div>

            </div>

            <!-- EMAIL -->
            <div class="form-group">

                <label>Email</label>

                <input
                    type="email"
                    name="email"
                    [(ngModel)]="employee.email"
                    required
                    #email="ngModel"
                    [class.invalid]="email.invalid && email.touched">

                <div *ngIf="email.invalid && email.touched" class="error">
                    Email is required
                </div>

            </div>

            <!-- DEPARTMENT -->
            <div class="form-group">

                <label>Department</label>

                <input
                    type="text"
                    name="department"
                    [(ngModel)]="employee.department"
                    required
                    #department="ngModel"
                    [class.invalid]="department.invalid && department.touched">

                <div *ngIf="department.invalid && department.touched" class="error">
                    Department is required
                </div>

            </div>

            <!-- STATUS -->
            <div class="form-group">

                <label>Status</label>

                <select
                    name="status"
                    [(ngModel)]="employee.status">

                    <option value="Active">Active</option>
                    <option value="Inactive">Inactive</option>

                </select>

            </div>

            <!-- BUTTONS -->
            <div class="form-actions">

                <button
                    type="submit"
                    class="btn-submit"
                    [disabled]="empForm.invalid || saving">

                    <span *ngIf="!saving">
                        {{ isEditMode ? 'Update Employee' : 'Save Employee' }}
                    </span>

                    <span *ngIf="saving" class="spinner"></span>

                </button>

                <button
                    type="button"
                    class="btn-clear"
                    (click)="resetForm()"
                    [disabled]="saving">

                    Clear

                </button>

            </div>

        </form>

    </div>

</div>
