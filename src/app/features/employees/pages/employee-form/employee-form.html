
<div class="form-page">

    <div class="form-card">

        <h2>{{ isEditMode ? 'Edit Employee' : 'Add Employee' }}</h2>

        <p class="subtitle">Employee details form</p>

        <form (ngSubmit)="saveEmployee()" #empForm="ngForm">

            <div class="form-group">

                <label>Name</label>

                <input
                    type="text"
                    name="name"
                    [(ngModel)]="employee.name"
                    required>

            </div>

            <div class="form-group">

                <label>Email</label>

                <input
                    type="email"
                    name="email"
                    [(ngModel)]="employee.email"
                    required>

            </div>

            <div class="form-group">

                <label>Department</label>

                <input
                    type="text"
                    name="department"
                    [(ngModel)]="employee.department"
                    required>

            </div>

            <div class="form-group">

                <label>Status</label>

                <select name="status" [(ngModel)]="employee.status">

                    <option value="Active">Active</option>

                    <option value="Inactive">Inactive</option>

                </select>

            </div>

            <button type="submit" class="btn-submit">

                {{ isEditMode ? 'Update Employee' : 'Save Employee' }}

            </button>

        </form>

    </div>

</div>
