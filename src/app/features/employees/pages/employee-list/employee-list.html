<div class="employee-page">

    <div class="header">

        <h2>Employees</h2>

        <a routerLink="/employees/add" class="btn btn-primary">
            + Add Employee
        </a>

    </div>

    <!-- 🔍 SEARCH BAR -->
    <div class="search-bar">

        <input
            type="text"
            placeholder="Search by name, email, department..."
            [(ngModel)]="searchTerm"
            (input)="onSearch()"
            class="search-input">

    </div>

    <div *ngIf="loading" class="loading">
        Loading employees...
    </div>

    <div class="table-container">

        <table class="data-table">

            <thead>

                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Department</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>

            </thead>

            <tbody>

                <tr *ngFor="let emp of paginatedEmployees">

                    <td>{{ emp.name }}</td>

                    <td>{{ emp.email }}</td>

                    <td>{{ emp.department }}</td>

                    <td>
                        <span class="badge" [ngClass]="emp.status">
                            {{ emp.status }}
                        </span>
                    </td>

                    <td class="actions">

                        <a
                            [routerLink]="['/employees/edit', emp.id]"
                            class="btn edit">
                            Edit
                        </a>

                        <button
                            (click)="deleteEmployee(emp.id)"
                            class="btn delete">
                            Delete
                        </button>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>
