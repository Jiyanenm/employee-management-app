
<div class="dashboard">

    <h2>Dashboard</h2>

    <p class="subtitle">Overview of your HR system</p>

    <div class="cards">

        <div class="card total">

            <h3>Total Employees</h3>

            <p>{{ totalEmployees }}</p>

        </div>

        <div class="card active">

            <h3>Active</h3>

            <p>{{ activeEmployees }}</p>

        </div>

        <div class="card inactive">

            <h3>Inactive</h3>

            <p>{{ inactiveEmployees }}</p>

        </div>

        <div class="card departments">

            <h3>Departments</h3>

            <p>{{ departments }}</p>

        </div>

    </div>

</div>
